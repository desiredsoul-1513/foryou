<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartConnect - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-light: #fdf2f8;
      --bg-dark: #f5f3ff;
      --primary: #9333ea;
      --primary-light: #c084fc;
      --accent: #ec4899;
      --accent-light: #f472b6;
      --text-dark: #581c87;
      --text-muted: #7e22ce;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.9);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-dark) 50%, #ede9fe 100%);
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Decorative Background Elements */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.6;
      z-index: 0;
      animation: float 10s infinite ease-in-out;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(45deg, var(--primary-light), var(--accent-light));
      top: -100px;
      left: -100px;
    }

    .blob-2 {
      width: 300px;
      height: 300px;
      background: linear-gradient(45deg, var(--accent), var(--primary));
      bottom: -50px;
      right: -50px;
      animation-delay: 2s;
    }

    .blob-3 {
      width: 200px;
      height: 200px;
      background: #f9a8d4;
      top: 40%;
      right: 20%;
      animation-delay: 4s;
    }

    /* Floating Hearts Background */
    .hearts-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart-shape {
      position: absolute;
      opacity: 0.1;
      animation: rise 15s linear infinite;
    }

    @keyframes rise {
      0% {
        transform: translateY(100vh) scale(0.5) rotate(0deg);
        opacity: 0;
      }
      20% {
        opacity: 0.15;
      }
      80% {
        opacity: 0.15;
      }
      100% {
        transform: translateY(-20vh) scale(1.2) rotate(20deg);
        opacity: 0;
      }
    }

    /* Card Styles */
    .login-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 
        0 25px 50px -12px rgba(147, 51, 234, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      border-radius: 32px;
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 3rem 2.5rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-card:hover {
      transform: translateY(-5px);
      box-shadow: 
        0 30px 60px -15px rgba(147, 51, 234, 0.25),
        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
    }

    /* Typography */
    .brand-title {
      font-family: 'Pacifico', cursive;
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .welcome-text {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    /* Form Inputs */
    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .input-field {
      width: 100%;
      padding: 16px 20px 16px 50px;
      background: rgba(255, 255, 255, 0.8);
      border: 2px solid transparent;
      border-radius: 16px;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      color: var(--text-dark);
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field::placeholder {
      color: #a78bfa;
    }

    .input-field:focus {
      border-color: var(--primary-light);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.2);
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary-light);
      transition: color 0.3s;
    }

    .input-field:focus + .input-icon,
    .input-group:hover .input-icon {
      color: var(--primary);
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--accent);
    }

    /* Primary Button */
    .btn-love {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      background-size: 200% 200%;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.4);
      position: relative;
      overflow: hidden;
    }

    .btn-love::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-love:hover {
      background-position: 100% 100%;
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(236, 72, 153, 0.5);
    }

    .btn-love:hover::before {
      opacity: 1;
    }

    .btn-love:active {
      transform: translateY(0);
      box-shadow: 0 5px 15px -5px rgba(236, 72, 153, 0.4);
    }

    .btn-love span {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(147, 51, 234, 0.3), transparent);
    }

    .divider span {
      padding: 0 1rem;
    }

    /* Social Buttons */
    .social-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 2px solid rgba(147, 51, 234, 0.2);
      background: white;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-btn:hover {
      border-color: var(--primary-light);
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
    }

    /* Links */
    .link-text {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      transition: color 0.2s;
      position: relative;
    }

    .link-text::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s ease;
      border-radius: 1px;
    }

    .link-text:hover {
      color: var(--accent);
    }

    .link-text:hover::after {
      width: 100%;
    }

    /* Loading Spinner */
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success Animation */
    .checkmark {
      width: 24px;
      height: 24px;
      stroke: white;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .checkmark-circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark-check {
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.4s forwards;
    }

    @keyframes stroke {
      100% { stroke-dashoffset: 0; }
    }

    /* Floating animation for blobs */
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(30px, -30px); }
      66% { transform: translate(-20px, 20px); }
    }

    /* Entrance Animation */
    .fade-in-up {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        margin: 1rem;
        padding: 2rem 1.5rem;
        border-radius: 24px;
      }
      .brand-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Floating Hearts Background -->
  <div class="hearts-bg" id="hearts-container"></div>

  <!-- Login Card -->
  <div class="login-card fade-in-up">
    
    <!-- Header -->
    <div class="text-center mb-2">
      <!-- Heart Icon -->
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 mb-4 shadow-lg">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </div>
      <h1 class="brand-title">HeartConnect</h1>
      <p class="welcome-text">Welcome back! We missed you.</p>
    </div>

    <!-- Form -->
    <form id="loginForm">
      <!-- Email Input -->
      <div class="input-group">
        <input 
          type="email" 
          id="email"
          class="input-field" 
          placeholder="your@email.com" 
          required
          autocomplete="email"
          aria-label="Email address"
        >
        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>

      <!-- Password Input -->
      <div class="input-group">
        <input 
          type="password" 
          id="password"
          class="input-field" 
          placeholder="Your password" 
          required
          autocomplete="current-password"
          aria-label="Password"
        >
        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <button type="button" class="toggle-password" id="toggleBtn" aria-label="Toggle password visibility">
          <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <!-- Remember & Forgot -->
      <div class="flex items-center justify-between mb-6">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 accent-pink-500 rounded">
          <span class="text-sm font-semibold text-purple-700 group-hover:text-pink-600 transition-colors">Remember me</span>
        </label>
        <a href="#" class="link-text text-sm">Forgot Password?</a>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn-love" id="submitBtn">
        <span id="btnContent">
          Sign In
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>or continue with</span>
    </div>

    <!-- Social Login -->
    <div class="flex gap-4 mb-6">
      <!-- Google -->
      <button class="social-btn" aria-label="Sign in with Google">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
      <!-- Apple -->
      <button class="social-btn" aria-label="Sign in with Apple">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="text-gray-800">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
      </button>
      <!-- Twitter/X -->
      <button class="social-btn" aria-label="Sign in with X">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="text-gray-800">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </button>
    </div>

    <!-- Sign Up Link -->
    <p class="text-center text-sm font-semibold text-purple-800">
      Don't have an account? 
      <a href="#" class="link-text">Create one</a>
    </p>
  </div>

  <script>
    // Generate floating hearts
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('hearts-container');
      const heartSVG = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
      
      const colors = ['#f9a8d4', '#c084fc', '#a78bfa', '#f472b6', '#e879f9'];
      
      for (let i = 0; i < 15; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-shape';
        heart.innerHTML = heartSVG;
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDelay = Math.random() * 15 + 's';
        heart.style.animationDuration = (15 + Math.random() * 10) + 's';
        heart.style.color = colors[Math.floor(Math.random() * colors.length)];
        heart.style.width = (20 + Math.random() * 20) + 'px';
        heart.style.height = 'auto';
        container.appendChild(heart);
      }
    });

    // Password visibility toggle
    const toggleBtn = document.getElementById('toggleBtn');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    
    let isPasswordVisible = false;
    
    toggleBtn.addEventListener('click', () => {
      isPasswordVisible = !isPasswordVisible;
      passwordInput.type = isPasswordVisible ? 'text' : 'password';
      
      // Toggle icon
      if (isPasswordVisible) {
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
      } else {
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    });

    // Form submission
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnContent = document.getElementById('btnContent');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Show loading state
      submitBtn.disabled = true;
      btnContent.innerHTML = '<div class="spinner"></div>';
      
      // Simulate API call
      await new Promise(resolve => setTimeout(resolve, 1800));
      
      // Show success state
      btnContent.innerHTML = `
        <svg class="checkmark" viewBox="0 0 24 24">
          <circle class="checkmark-circle" cx="12" cy="12" r="10"/>
          <path class="checkmark-check" d="M8 12l2.5 2.5 5-5"/>
        </svg>
        Success!
      `;
      
      // Reset after delay (in real app, redirect would happen here)
      setTimeout(() => {
        btnContent.innerHTML = `
          Sign In
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        `;
        submitBtn.disabled = false;
      }, 2000);
    });

    // Input focus animations
    const inputs = document.querySelectorAll('.input-field');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.style.transform = 'scale(1.02)';
      });
      input.addEventListener('blur', () => {
        input.parentElement.style.transform = 'scale(1)';
      });
    });
  </script>
</body>
</html>
